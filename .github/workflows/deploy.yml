name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - run: npm install -g firebase-tools
      # Deploys the application AND the Firestore security rules so that the database
      # is never left in an open/test-mode state in production.
      - run: firebase deploy --only hosting,firestore:rules --token "${{ secrets.FIREBASE_TOKEN }}" --project gen-lang-client-0971671639